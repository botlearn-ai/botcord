id: quickstart_install_and_register
description: Fresh OpenClaw installs BotCord from homepage prompt and completes registration.
runtime:
  instance_count: 2
  model: google-vertex/gemini-3-flash-preview
  health_timeout_seconds: 180
  gateway_recovery_seconds: 10
prompt:
  source: frontend-derived
  kind: homepage_quickstart
  fallback: scenario-override
  override_template: |
    Please follow this setup guide to install and configure BotCord:
    {setup_guide_url}
steps:
  - id: send_quickstart_prompt
    action: openclaw.agent_prompt
    description: Send the Quick Start prompt to each OpenClaw instance
  - id: wait_gateway_recovered
    action: runtime.wait_healthy
    description: Wait for gateway to recover after plugin installation
    params:
      delay_seconds: 10
  - id: run_healthcheck
    action: openclaw.agent_prompt
    description: Run /botcord_healthcheck command
    params:
      message: "/botcord_healthcheck"
  - id: read_openclaw_config
    action: filesystem.read_json
    description: Read openclaw.json from each instance
    params:
      path: .openclaw/openclaw.json
  - id: read_credentials
    action: filesystem.read_credentials
    description: Read BotCord credentials from each instance
    params:
      glob: .botcord/credentials/*.json
  - id: switch_env
    action: runtime.switch_env
    description: Rewrite credentials hubUrl to target environment (after credentials exist)
  - id: restart_after_env_switch
    action: runtime.restart_and_wait
    description: Restart gateway for env switch to take effect
  - id: query_agent_registration
    action: db.query
    description: Query database for agent registration
  - id: restart_and_verify
    action: runtime.restart_and_verify
    description: Restart container and verify credentials persist
assertions:
  - id: agent_output.status_ok
    description: OpenClaw CLI returns JSON with status ok
  - id: agent_output.payload_non_empty
    description: Agent response payload is non-empty
  - id: plugin.install_present
    description: BotCord plugin directory exists
  - id: openclaw_config.botcord_enabled
    description: channels.botcord.enabled is true in openclaw.json
  - id: openclaw_config.credentials_file_exists
    description: channels.botcord.credentialsFile points to existing file
  - id: openclaw_config.delivery_mode_set
    description: channels.botcord.deliveryMode is set
  - id: credentials.valid_json
    description: Credentials file is valid JSON
  - id: credentials.has_agent_id
    description: Credentials contain agentId
  - id: credentials.hub_matches_environment
    description: hubUrl in credentials matches target environment
  - id: db.agent_exists
    description: Agent record exists in database
  - id: db.signing_key_active
    description: Active signing key exists for agent
  - id: db.claim_code_present
    description: Claim code exists for agent
  - id: healthcheck.connection_ok
    description: Healthcheck reports Hub connection is active
  - id: restart.credentials_persist
    description: Credentials file survives container restart
  - id: restart.healthcheck_ok
    description: Healthcheck passes after container restart
