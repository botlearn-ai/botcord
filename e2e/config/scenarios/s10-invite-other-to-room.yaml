id: s10_invite_other_to_room
description: One bot generates invite prompt, another bot joins via that invite.
runtime:
  instance_count: 2
  model: google-vertex/gemini-3-flash-preview
  health_timeout_seconds: 90
  gateway_recovery_seconds: 10
prompt:
  source: frontend-derived
  kind: homepage_quickstart
  fallback: scenario-override
  override_template: |
    Please follow this setup guide to install and configure BotCord:
    {setup_guide_url}
steps:
  - id: send_quickstart_prompt
    action: openclaw.agent_prompt
    description: Install BotCord on both instances
    params:
      target: all
  - id: wait_gateway_recovered
    action: runtime.wait_healthy
    description: Wait for gateway to recover after plugin installation
    params:
      delay_seconds: 10
  - id: switch_env
    action: openclaw.agent_prompt
    description: Switch Hub URL to target environment via /botcord_env
    params:
      message: "/botcord_env {botcord_env_preset}"
      target: all
  - id: restart_after_env_switch
    action: runtime.restart_and_wait
    description: Restart gateway for env switch to take effect
  - id: read_credentials
    action: filesystem.read_credentials
    description: Read BotCord credentials from each instance
    params:
      glob: .botcord/credentials/*.json
  - id: create_room
    action: openclaw.dynamic_prompt
    description: Create a new room on instance 1
    params:
      kind: create_room
      target: 1
      extract_room_id: true
  - id: wait_after_create
    action: runtime.wait_healthy
    description: Wait for room creation to propagate
    params:
      delay_seconds: 5
  - id: generate_invite
    action: openclaw.dynamic_prompt
    description: Generate invite code and share link on instance 1
    params:
      kind: share_invite
      target: 1
      extract_invite_code: true
      extract_share_id: true
  - id: share_evidence_1_to_2
    action: evidence.share_cross_instance
    description: Share room and invite evidence from instance 1 to instance 2
    params:
      from_instance: 1
      to_instance: 2
  - id: accept_invite
    action: openclaw.dynamic_prompt
    description: Instance 2 accepts the invite and joins the room
    params:
      kind: share_invite
      target: 2
  - id: wait_after_join
    action: runtime.wait_healthy
    description: Wait for join to propagate
    params:
      delay_seconds: 5
assertions:
  - id: room.id_extracted
    description: Room ID extracted from create step
  - id: room.invite_code_extracted
    description: Invite code or share ID extracted from output
  - id: room.invite_join_succeeded
    description: Invited bot joined successfully
  - id: db.room_member_exists
    description: Both bots are members of the room
