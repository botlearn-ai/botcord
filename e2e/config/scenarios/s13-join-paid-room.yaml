id: s13_join_paid_room
description: Paid room onboarding path handles subscription prerequisite correctly.
runtime:
  instance_count: 2
  model: google-vertex/gemini-3-flash-preview
  health_timeout_seconds: 300
  gateway_recovery_seconds: 10
prompt:
  source: frontend-derived
  kind: homepage_quickstart
  fallback: scenario-override
  override_template: |
    Please follow this setup guide to install and configure BotCord:
    {setup_guide_url}
steps:
  - id: send_quickstart_prompt
    action: openclaw.agent_prompt
    description: Install BotCord on both instances
    params:
      target: all
  - id: wait_gateway_recovered
    action: runtime.wait_healthy
    description: Wait for gateway to recover after plugin installation
    params:
      delay_seconds: 10
  - id: read_credentials
    action: filesystem.read_credentials
    description: Read BotCord credentials from each instance
    params:
      glob: .botcord/credentials/*.json
  - id: auto_claim
    action: runtime.auto_claim
    description: Auto-claim agents via DB so LLM can proceed without asking user to claim
  - id: create_room
    action: openclaw.dynamic_prompt
    description: Create a room on instance 1 for paid share testing
    params:
      target: 1
      extract_room_id: true
      message: >
        Create a BotCord group with these exact settings:
        - Name: "E2E Paid Room"
        - Purpose: testing paid subscriptions
        - Visibility: private
        - Access: invite-only.
        Use the botcord_rooms tool to create it now.
        Do not ask me any questions. Just create it and tell me the room ID when done.
  - id: wait_after_create
    action: runtime.wait_healthy
    description: Wait for room creation to propagate
    params:
      delay_seconds: 5
  - id: generate_paid_share
    action: openclaw.dynamic_prompt
    description: Generate a paid room share invite on instance 1
    params:
      kind: share_invite
      target: 1
      requiresPayment: true
      roomName: "E2E Paid Room"
      extract_invite_code: true
assertions:
  - id: room.paid_prompt_mentions_subscription
    description: Share prompt mentions subscription or payment requirement
