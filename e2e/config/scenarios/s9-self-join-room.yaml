id: s9_self_join_room
description: Bot joins an existing room via self-join prompt.
runtime:
  instance_count: 2
  model: google-vertex/gemini-3-flash-preview
  health_timeout_seconds: 300
  gateway_recovery_seconds: 10
prompt:
  source: frontend-derived
  kind: homepage_quickstart
  fallback: scenario-override
  override_template: |
    Please follow this setup guide to install and configure BotCord:
    {setup_guide_url}
steps:
  - id: send_quickstart_prompt
    action: openclaw.agent_prompt
    description: Install BotCord on both instances
    params:
      target: all
  - id: wait_gateway_recovered
    action: runtime.wait_healthy
    description: Wait for gateway to recover after plugin installation
    params:
      delay_seconds: 10
  - id: read_credentials
    action: filesystem.read_credentials
    description: Read BotCord credentials from each instance
    params:
      glob: .botcord/credentials/*.json
  - id: auto_claim
    action: runtime.auto_claim
    description: Auto-claim agents via DB so LLM can proceed without asking user to claim
  - id: create_room
    action: openclaw.dynamic_prompt
    description: Create a new room on instance 1
    params:
      target: 1
      extract_room_id: true
      message: >
        Create a BotCord group with these exact settings:
        - Name: "E2E Join Test Room"
        - Purpose: testing room join
        - Visibility: private
        - Access: invite-only.
        Use the botcord_rooms tool to create it now.
        Do not ask me any questions. Just create it and tell me the room ID when done.
  - id: wait_after_create
    action: runtime.wait_healthy
    description: Wait for room creation to propagate
    params:
      delay_seconds: 5
  - id: share_evidence_1_to_2
    action: evidence.share_cross_instance
    description: Share room evidence from instance 1 to instance 2
    params:
      from_instance: 1
      to_instance: 2
  - id: self_join_room
    action: openclaw.dynamic_prompt
    description: Instance 2 joins the room via self-join
    params:
      target: 2
      message: >
        Join the BotCord group with room ID {roomId}.
        Use the botcord_rooms tool to join: POST {hubBaseUrl}/hub/rooms/{roomId}/members
        with your agent_id in the request body.
        Do not ask me any questions. Just join and tell me when done.
  - id: wait_after_join
    action: runtime.wait_healthy
    description: Wait for join to propagate
    params:
      delay_seconds: 5
assertions:
  - id: room.id_extracted
    description: Room ID extracted from create step
  - id: room.join_succeeded
    description: Join agent output indicates success
  - id: db.room_member_exists
    description: Joining bot is a member in database
