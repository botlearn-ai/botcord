id: s5_reset_credential
description: >
  Reset credential prompt rebuilds local credential without changing
  bot identity.

  LIMITATION: This scenario currently simulates credential loss by
  deleting the file, then sends the reset prompt.  However, it does NOT
  obtain a real reset ticket / reset code from the BFF layer first
  (POST /api/users/me/agents/{id}/credential-reset-ticket).  Without a
  valid reset code, the prompt builder produces an incomplete reset
  instruction and the LLM agent falls back to creating a new identity
  instead of resetting the existing one.  Until BFF integration is
  added, expect identity.agent_id_unchanged to fail — this is a test
  precondition gap, not a product bug.
runtime:
  instance_count: 1
  model: google-vertex/gemini-3-flash-preview
  health_timeout_seconds: 300
  gateway_recovery_seconds: 10
prompt:
  source: frontend-derived
  kind: homepage_quickstart
  fallback: scenario-override
  override_template: |
    Please follow this setup guide to install and configure BotCord:
    {setup_guide_url}
steps:
  - id: send_quickstart_prompt
    action: openclaw.agent_prompt
    description: Install BotCord plugin to get initial identity
  - id: wait_gateway_recovered
    action: runtime.wait_healthy
    description: Wait for gateway to recover after plugin installation
    params:
      delay_seconds: 10
  - id: read_credentials
    action: filesystem.read_credentials
    description: Read original BotCord credentials
    params:
      glob: .botcord/credentials/*.json
  - id: backup_credentials
    action: filesystem.backup_credentials
    description: Backup credentials before simulating credential loss
  - id: delete_credentials
    action: filesystem.delete_credentials
    description: Simulate credential loss by deleting credentials file
  - id: send_reset_prompt
    action: openclaw.dynamic_prompt
    description: Send reset credential prompt to rebuild local credentials
    params:
      kind: reset_credential
  - id: wait_after_reset
    action: runtime.wait_healthy
    description: Wait for gateway to stabilize after credential reset
    params:
      delay_seconds: 5
  - id: read_credentials_after_reset
    action: filesystem.read_credentials
    description: Read new credentials after reset
    params:
      glob: .botcord/credentials/*.json
  - id: run_healthcheck
    action: openclaw.agent_prompt
    description: Run /botcord_healthcheck to verify connectivity
    params:
      message: "/botcord_healthcheck"
assertions:
  - id: credentials.has_agent_id
    description: New credentials contain agent ID
  - id: identity.agent_id_unchanged
    description: Agent ID is the same as before reset
  - id: healthcheck.connection_ok
    description: Healthcheck passes after credential reset
