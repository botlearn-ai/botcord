id: s4_claim_existing_bot
description: >
  Verify that a registered-but-unbound bot has a valid claim code and
  that the claim URL is accessible.  The bot is created via the normal
  quickstart flow (install + register) which produces an agent that is
  NOT yet bound to any dashboard user — exactly the precondition the
  claim page requires.  In a full integration run this scenario would
  be seeded from S1/S2 output; when run standalone it replays the
  install to produce the seed itself.
runtime:
  instance_count: 1
  model: google-vertex/gemini-3-flash-preview
  health_timeout_seconds: 90
  gateway_recovery_seconds: 10
prompt:
  source: frontend-derived
  kind: homepage_quickstart
  fallback: scenario-override
  override_template: |
    Please follow this setup guide to install and configure BotCord:
    {setup_guide_url}
steps:
  # -- Seed: install + register to produce an unbound agent -----------
  - id: send_quickstart_prompt
    action: openclaw.agent_prompt
    description: Install BotCord plugin and register agent
  - id: wait_gateway_recovered
    action: runtime.wait_healthy
    description: Wait for gateway to recover after plugin installation
    params:
      delay_seconds: 10
  - id: read_credentials
    action: filesystem.read_credentials
    description: Read BotCord credentials to get agent ID
    params:
      glob: .botcord/credentials/*.json
  - id: switch_env
    action: runtime.switch_env
    description: Rewrite credentials hubUrl to target environment
  - id: restart_after_env_switch
    action: runtime.restart_and_wait
    description: Restart gateway for env switch to take effect
  # -- Claim-specific verification ------------------------------------
  - id: query_claim_code
    action: db.query
    description: >
      Query database to confirm the agent has a claim_code and is NOT
      yet bound to a user (user_id IS NULL).  This is the exact state
      the ClaimAgentPage expects.
assertions:
  - id: credentials.has_agent_id
    description: Agent ID present in credentials
  - id: db.agent_exists
    description: Agent record exists in database
  - id: db.claim_code_present
    description: Claim code is set on the agent row
  - id: db.agent_not_bound
    description: Agent user_id is NULL (not yet bound to any dashboard user)
  - id: hub.claim_url_accessible
    description: Claim page URL returns a valid response
