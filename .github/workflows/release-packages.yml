name: Release Packages

# Changesets-driven npm release for the JS monorepo packages
# (@botcord/protocol-core, @botcord/cli, @botcord/daemon,
# @botcord/gateway-ingress).
#
# Flow:
#   1. Developer adds a changeset in their PR: `pnpm changeset`.
#   2. PR merges to main → this workflow runs.
#   3. If unreleased changesets exist, the action opens (or updates) a
#      "Version Packages" PR that bumps versions + writes CHANGELOG entries.
#   4. Merging that PR triggers this workflow again; this time it publishes
#      to npm in topological order. `workspace:^` ranges are auto-replaced
#      with the actual published versions by `pnpm publish`.
#
# Manual emergency hotfix path: see publish-package-manual.yml.

on:
  push:
    branches:
      - main

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter "./packages/*" --filter "./cli" build

      # Guard against surprise auto-publish.
      #
      # changesets/action falls back to `changeset publish` whenever no
      # pending changesets exist; that scans every workspace package and
      # publishes anything whose local version is missing from npm — which
      # silently first-published @botcord/gateway-ingress on the migration
      # commit (see incident on 2026-05-27). Only run the action when
      # either:
      #   - pending changesets exist (→ open/update Version PR), OR
      #   - this push merged the Version PR (→ publish bumped versions).
      - name: Decide whether to run changesets action
        id: decide
        run: |
          HAS_CHANGESETS=false
          if ls .changeset/*.md 2>/dev/null | grep -v -E '/README\.md$' | grep -q .; then
            HAS_CHANGESETS=true
          fi
          IS_RELEASE_COMMIT=false
          if git log -1 --pretty=%s | grep -q "^chore(release): version packages"; then
            IS_RELEASE_COMMIT=true
          fi
          if [ "$HAS_CHANGESETS" = "true" ] || [ "$IS_RELEASE_COMMIT" = "true" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi
          echo "has_changesets=$HAS_CHANGESETS" >> $GITHUB_OUTPUT
          echo "is_release_commit=$IS_RELEASE_COMMIT" >> $GITHUB_OUTPUT

      - name: Create Release PR or Publish
        id: changesets
        if: steps.decide.outputs.run == 'true'
        uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          publish: pnpm exec changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare notification summary
        id: notify-data
        if: steps.changesets.outputs.published == 'true'
        run: |
          PACKAGES_JSON='${{ steps.changesets.outputs.publishedPackages }}'
          SUMMARY=$(echo "$PACKAGES_JSON" | node -e "
            const pkgs = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            console.log(pkgs.map(p => p.name + '@' + p.version).join(', '));
          ")
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT

      - name: Send Feishu notification
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/feishu-notify
        with:
          webhook_url: ${{ secrets.FEISHU_WEBHOOK_URL }}
          title: "✅「BotCord Packages」Release - 发布成功"
          color: green
          fields: |
            [
              {"label": "状态", "value": "发布成功"},
              {"label": "已发布", "value": "${{ steps.notify-data.outputs.summary }}"},
              {"label": "触发者", "value": "${{ github.actor }}"}
            ]
          buttons: |
            [
              {"text": "查看详情", "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "type": "primary"}
            ]
