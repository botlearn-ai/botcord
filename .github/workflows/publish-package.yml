name: Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - plugin
          - cli
          - protocol-core
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      channel:
        description: "Release channel (stable → latest, beta → test hub)"
        required: true
        type: choice
        options:
          - stable
          - beta
        default: stable

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ${{ github.event.inputs.package == 'protocol-core' && 'packages/protocol-core' || github.event.inputs.package }}
    env:
      PKG: ${{ github.event.inputs.package }}
      PKG_DIR: ${{ github.event.inputs.package == 'protocol-core' && 'packages/protocol-core' || github.event.inputs.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve npm package name
        id: meta
        run: |
          NPM_NAME=$(node -p "require('./package.json').name")
          echo "npm_name=$NPM_NAME" >> $GITHUB_OUTPUT
          case "$PKG" in
            plugin) DISPLAY_NAME="Plugin" ;;
            cli) DISPLAY_NAME="CLI" ;;
            protocol-core) DISPLAY_NAME="Protocol Core" ;;
          esac
          echo "display_name=$DISPLAY_NAME" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Build protocol-core (workspace dependency)
        if: env.PKG != 'protocol-core'
        working-directory: packages/protocol-core
        run: |
          npm install
          npm run build

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        if: env.PKG == 'cli' || env.PKG == 'protocol-core'
        run: npm run build

      - name: Run tests
        if: env.PKG == 'plugin'
        run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          NPM_NAME="${{ steps.meta.outputs.npm_name }}"
          LOCAL_VERSION=$(node -p "require('./package.json').version")

          # Resolve the highest published version from npm registry.
          # For beta: look at beta prereleases; for stable: look at stable releases.
          if [ "${{ github.event.inputs.channel }}" = "beta" ]; then
            FILTER='v.includes("-beta.")'
            EXTRACT='v.replace(/-beta\..*/, "")'
          else
            FILTER='!v.includes("-")'
            EXTRACT='v'
          fi

          NPM_BASE=$(npm view "$NPM_NAME" versions --json 2>/dev/null | node -e "
            const versions = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            const bases = versions
              .filter(v => ${FILTER})
              .map(v => ${EXTRACT});
            if (bases.length === 0) { console.log('0.0.0'); process.exit(); }
            bases.sort((a, b) => {
              const [a1,a2,a3] = a.split('.').map(Number);
              const [b1,b2,b3] = b.split('.').map(Number);
              return (a1 - b1) || (a2 - b2) || (a3 - b3);
            });
            console.log(bases[bases.length - 1]);
          " || echo "0.0.0")

          # Pick the higher of local vs npm as the starting point
          HIGHER=$(node -e "
            const [a, b] = ['$LOCAL_VERSION', '$NPM_BASE'].map(v => v.split('.').map(Number));
            console.log(a[0] > b[0] || (a[0] === b[0] && a[1] > b[1]) || (a[0] === b[0] && a[1] === b[1] && a[2] >= b[2]) ? '$LOCAL_VERSION' : '$NPM_BASE');
          ")

          # Set package.json to the higher version, then bump
          npm version "$HIGHER" --no-git-tag-version --allow-same-version > /dev/null
          npm version ${{ github.event.inputs.bump }} --no-git-tag-version > /dev/null
          NEW_VERSION="v$(node -p "require('./package.json').version")"

          if [ "${{ github.event.inputs.channel }}" = "beta" ]; then
            # Append -beta.<timestamp> prerelease suffix
            BASE="${NEW_VERSION#v}"
            BETA_VERSION="${BASE}-beta.$(date +%Y%m%d%H%M%S)"
            npm version "$BETA_VERSION" --no-git-tag-version --allow-same-version > /dev/null
            NEW_VERSION="v${BETA_VERSION}"
          fi
          printf 'new_version=%s\n' "$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync version to openclaw.plugin.json
        if: env.PKG == 'plugin'
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' openclaw.plugin.json > tmp.json && mv tmp.json openclaw.plugin.json

      - name: Set release channel in source
        if: env.PKG == 'plugin' && github.event.inputs.channel == 'beta'
        run: |
          sed -i 's/RELEASE_CHANNEL: ReleaseChannel = "stable"/RELEASE_CHANNEL: ReleaseChannel = "beta"/' src/constants.ts

      - name: Publish to npm
        run: |
          if [ "${{ github.event.inputs.channel }}" = "beta" ]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and tag
        if: github.event.inputs.channel == 'stable'
        run: |
          if [ "$PKG" = "plugin" ]; then
            git add package.json package-lock.json openclaw.plugin.json
          else
            git add package.json
          fi
          case "$PKG" in
            plugin) TAG_PREFIX="" ;;
            cli) TAG_PREFIX="cli-" ;;
            protocol-core) TAG_PREFIX="protocol-core-" ;;
          esac
          git commit -m "chore: release ${PKG} ${{ steps.bump.outputs.new_version }}"
          git tag "${TAG_PREFIX}${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:main --tags

      - name: Prepare notification data
        id: notify-data
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status_icon=✅" >> $GITHUB_OUTPUT
            echo "status_text=成功" >> $GITHUB_OUTPUT
            echo "status_color=green" >> $GITHUB_OUTPUT
            echo "status_desc=发布成功" >> $GITHUB_OUTPUT
          else
            echo "status_icon=❌" >> $GITHUB_OUTPUT
            echo "status_text=失败" >> $GITHUB_OUTPUT
            echo "status_color=red" >> $GITHUB_OUTPUT
            echo "status_desc=发布失败" >> $GITHUB_OUTPUT
          fi

      - name: Send Feishu notification
        if: always()
        uses: ./.github/actions/feishu-notify
        with:
          webhook_url: ${{ secrets.FEISHU_WEBHOOK_URL }}
          title: '${{ steps.notify-data.outputs.status_icon }}「BotCord ${{ steps.meta.outputs.display_name }}」Publish - ${{ steps.notify-data.outputs.status_text }}'
          color: ${{ steps.notify-data.outputs.status_color }}
          fields: |
            [
              {"label": "状态", "value": "${{ steps.notify-data.outputs.status_desc }}"},
              {"label": "包", "value": "${{ steps.meta.outputs.npm_name }}"},
              {"label": "版本", "value": "${{ steps.bump.outputs.new_version }}"},
              {"label": "Bump 类型", "value": "${{ github.event.inputs.bump }}"},
              {"label": "渠道", "value": "${{ github.event.inputs.channel }}"},
              {"label": "触发者", "value": "${{ github.actor }}"}
            ]
          buttons: |
            [
              {"text": "查看详情", "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "type": "primary"},
              {"text": "npm 页面", "url": "https://www.npmjs.com/package/${{ steps.meta.outputs.npm_name }}", "type": "default"}
            ]
