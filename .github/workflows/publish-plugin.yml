name: Publish Plugin

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      channel:
        description: "Release channel (stable → latest, beta → test hub)"
        required: true
        type: choice
        options:
          - stable
          - beta
        default: stable

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: plugin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ github.event.inputs.bump }} --no-git-tag-version)
          if [ "${{ github.event.inputs.channel }}" = "beta" ]; then
            # Append -beta.<timestamp> prerelease suffix
            BASE="${NEW_VERSION#v}"
            BETA_VERSION="${BASE}-beta.$(date +%Y%m%d%H%M%S)"
            npm version "$BETA_VERSION" --no-git-tag-version --allow-same-version
            NEW_VERSION="v${BETA_VERSION}"
          fi
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Sync version to openclaw.plugin.json
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' openclaw.plugin.json > tmp.json && mv tmp.json openclaw.plugin.json

      - name: Set release channel in source
        if: github.event.inputs.channel == 'beta'
        run: |
          sed -i 's/RELEASE_CHANNEL: ReleaseChannel = "stable"/RELEASE_CHANNEL: ReleaseChannel = "beta"/' src/constants.ts

      - name: Publish to npm
        run: |
          if [ "${{ github.event.inputs.channel }}" = "beta" ]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and tag
        if: github.event.inputs.channel == 'stable'
        run: |
          git add package.json package-lock.json openclaw.plugin.json
          git commit -m "chore: release ${{ steps.bump.outputs.new_version }}"
          git tag ${{ steps.bump.outputs.new_version }}
          git push origin HEAD:main --tags

      - name: Prepare notification data
        id: notify-data
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status_icon=✅" >> $GITHUB_OUTPUT
            echo "status_text=成功" >> $GITHUB_OUTPUT
            echo "status_color=green" >> $GITHUB_OUTPUT
            echo "status_desc=发布成功" >> $GITHUB_OUTPUT
          else
            echo "status_icon=❌" >> $GITHUB_OUTPUT
            echo "status_text=失败" >> $GITHUB_OUTPUT
            echo "status_color=red" >> $GITHUB_OUTPUT
            echo "status_desc=发布失败" >> $GITHUB_OUTPUT
          fi

      - name: Send Feishu notification
        if: always()
        uses: ./.github/actions/feishu-notify
        with:
          webhook_url: ${{ secrets.FEISHU_WEBHOOK_URL }}
          title: '${{ steps.notify-data.outputs.status_icon }}「BotCord Plugin」Publish - ${{ steps.notify-data.outputs.status_text }}'
          color: ${{ steps.notify-data.outputs.status_color }}
          fields: |
            [
              {"label": "状态", "value": "${{ steps.notify-data.outputs.status_desc }}"},
              {"label": "版本", "value": "${{ steps.bump.outputs.new_version }}"},
              {"label": "Bump 类型", "value": "${{ github.event.inputs.bump }}"},
              {"label": "渠道", "value": "${{ github.event.inputs.channel }}"},
              {"label": "触发者", "value": "${{ github.actor }}"}
            ]
          buttons: |
            [
              {"text": "查看详情", "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "type": "primary"},
              {"text": "npm 页面", "url": "https://www.npmjs.com/package/@botcord/botcord", "type": "default"}
            ]
