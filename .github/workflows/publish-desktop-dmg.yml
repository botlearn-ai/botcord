name: Publish Desktop DMG

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build"
        required: false
        default: "main"
        type: string
      release_tag:
        description: "GitHub Release tag."
        required: false
        default: "botcord-desktop-beta"
        type: string
      draft:
        description: "Create/update the release as draft"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark the release as prerelease"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "desktop-v*"
      - "botcord-desktop-*"

permissions:
  contents: write

concurrency:
  group: publish-desktop-dmg-${{ github.event_name == 'push' && github.ref_name || inputs.release_tag || inputs.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Import Developer ID certificate
        env:
          MAC_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.MAC_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          MAC_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.MAC_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/developer-id-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          APP_CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          WWDR_CERT_PATH="$RUNNER_TEMP/AppleWWDRCAG3.cer"

          printf "%s" "$MAC_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64" | base64 -D > "$APP_CERT_PATH"
          curl -fsSL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o "$WWDR_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          security import "$WWDR_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security import "$APP_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MAC_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" \
            -A
          security set-key-partition-list -S apple-tool:,apple:,codesign:,unsigned: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          APP_SIGNING_IDENTITY="$(security find-certificate -a "$KEYCHAIN_PATH" | awk -F'"' '/alis/ && $4 ~ /^Developer ID Application:/ { print $4; exit }')"
          APP_SIGNING_IDENTITY_HASH="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/Developer ID Application:/{ print $2; exit }')"

          if [ -z "$APP_SIGNING_IDENTITY" ]; then
            echo "Developer ID Application signing identity was not found." >&2
            security find-certificate -a "$KEYCHAIN_PATH" | awk -F'"' '/alis/{ print $4 }' >&2 || true
            exit 1
          fi
          if [ -z "$APP_SIGNING_IDENTITY_HASH" ]; then
            echo "Developer ID Application signing identity hash was not found." >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" >&2 || true
            exit 1
          fi

          {
            echo "APPLE_SIGNING_IDENTITY=$APP_SIGNING_IDENTITY"
            echo "DEVELOPER_ID_SIGNING_IDENTITY_HASH=$APP_SIGNING_IDENTITY_HASH"
            echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH"
            echo "SIGNING_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD"
          } >> "$GITHUB_ENV"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf "%s" "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -D > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      - name: Resolve release metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="botcord-desktop-beta"
          fi
          ARCH=$(uname -m)

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "asset_prefix=BotCord_${TAG}_macos_${ARCH}" >> "$GITHUB_OUTPUT"
          echo "Resolved desktop release ${TAG} (${VERSION})"

      - name: Build Tauri app + DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: npm run build

      - name: Prepare release assets
        id: assets
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -euo pipefail

          DMG=$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name "*.dmg" -print -quit)
          APP="src-tauri/target/release/bundle/macos/BotCord.app"

          test -f "$DMG"
          test -d "$APP"

          mkdir -p release-assets
          DMG_OUT="release-assets/${{ steps.meta.outputs.asset_prefix }}.dmg"
          ZIP_OUT="release-assets/${{ steps.meta.outputs.asset_prefix }}.app.zip"

          codesign --verify --deep --strict --verbose=2 "$APP"
          cp "$DMG" "$DMG_OUT"
          codesign --force \
            --sign "$DEVELOPER_ID_SIGNING_IDENTITY_HASH" \
            --keychain "$SIGNING_KEYCHAIN" \
            --timestamp \
            "$DMG_OUT"
          codesign --verify --verbose=2 "$DMG_OUT"

          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP_OUT"

          xcrun notarytool submit "$DMG_OUT" \
            --key "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8" \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG_OUT"
          xcrun stapler validate "$DMG_OUT"
          spctl -a -vv --type open --context context:primary-signature "$DMG_OUT"

          shasum -a 256 "$DMG_OUT" "$ZIP_OUT" > release-assets/SHA256SUMS.txt

          echo "dmg=${DMG_OUT}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP_OUT}" >> "$GITHUB_OUTPUT"
          echo "checksums=release-assets/SHA256SUMS.txt" >> "$GITHUB_OUTPUT"
          ls -lh release-assets

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: botcord-desktop-macos-${{ steps.meta.outputs.tag }}
          path: |
            desktop/${{ steps.assets.outputs.dmg }}
            desktop/${{ steps.assets.outputs.zip }}
            desktop/${{ steps.assets.outputs.checksums }}
          if-no-files-found: error

      - name: Publish GitHub Release assets
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          DESKTOP_VERSION: ${{ steps.meta.outputs.version }}
          DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || startsWith(steps.meta.outputs.tag, 'desktop-v0.') || contains(steps.meta.outputs.tag, 'beta') }}
          DMG_PATH: desktop/${{ steps.assets.outputs.dmg }}
          ZIP_PATH: desktop/${{ steps.assets.outputs.zip }}
          CHECKSUMS_PATH: desktop/${{ steps.assets.outputs.checksums }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const draft = process.env.DRAFT === "true";
            const prerelease = process.env.PRERELEASE === "true";
            const body = [
              `BotCord Desktop ${process.env.DESKTOP_VERSION}`,
              "",
              "Assets:",
              "- macOS DMG installer",
              "- zipped .app bundle",
              "- SHA256 checksums",
            ].join("\n");

            let release;
            try {
              const res = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = res.data;
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                name: tag,
                body,
                draft,
                prerelease,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              const res = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                body,
                draft,
                prerelease,
                target_commitish: context.sha,
              });
              release = res.data;
            }

            const files = [
              process.env.DMG_PATH,
              process.env.ZIP_PATH,
              process.env.CHECKSUMS_PATH,
            ];

            for (const file of files) {
              const name = path.basename(file);
              for (const asset of release.assets.filter((asset) => asset.name === name)) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id,
                });
              }
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.id,
                name,
                data: fs.readFileSync(file),
              });
              console.log(`Uploaded ${name}`);
            }
