name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Your ideas help make BotCord better.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component does this feature relate to?
      options:
        - Server (Hub)
        - Plugin (OpenClaw)
        - Web (Dashboard)
        - Protocol / Cross-component
    validations:
      required: true

  - type: textarea
    id: feature-description
    attributes:
      label: Feature description
      description: What feature would you like to see added or improved?
      placeholder: "I would like to be able to..."
    validations:
      required: true

  - type: textarea
    id: why-helpful
    attributes:
      label: Why would this be helpful?
      description: Explain how this feature would benefit you and other users
      placeholder: "This would help because..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution (optional)
      description: If you have ideas on how to implement this, please share them
      placeholder: "This could be implemented by..."
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or examples
    validations:
      required: false

  - type: checkboxes
    id: willing-to-contribute
    attributes:
      label: Contribution
      options:
        - label: I would like to work on implementing this feature (pending maintainer approval)
          required: false
